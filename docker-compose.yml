# Docker Compose for the invoice platform — Mongo + API + Frontend.
#
#   docker compose up --build         # full stack: frontend :8080, API :5050, mongo :27017
#   docker compose up -d mongo        # just Mongo (for local dev against pnpm dev servers)
#   docker compose run --rm api pnpm --filter @invoice/backend seed   # seed the DB once
services:
  mongo:
    image: mongo:7
    container_name: invoice-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # Marks the container healthy only once Mongo actually answers pings —
      # so dependent services (api) can `depends_on` it with condition: service_healthy.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: invoice-api
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/invoice_platform
      PORT: "5050"
    ports:
      - "5050:5050"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: invoice-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mongo-data:
